<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Energy & Stress Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui; }
    .history { max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-white p-6 max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-center mb-8">Daily Tracker</h1>
  
  <div class="bg-zinc-900 rounded-2xl p-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Energy -->
      <div>
        <label class="block text-sm mb-2 font-medium">Energy Level (1-10)</label>
        <select id="energy" class="w-full bg-zinc-800 text-white rounded-xl p-4 text-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500">
          <option value="1">1 - 非常疲累</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5 - 中等</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10 - 精力爆棚</option>
        </select>
      </div>

      <!-- Stress -->
      <div>
        <label class="block text-sm mb-2 font-medium">Stress Level (1-10)</label>
        <select id="stress" class="w-full bg-zinc-800 text-white rounded-xl p-4 text-2xl focus:outline-none focus:ring-2 focus:ring-amber-500">
          <option value="1">1 - 非常放鬆</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5 - 中等</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10 - 壓力爆表</option>
        </select>
      </div>

      <!-- Sleep -->
      <div>
        <label class="block text-sm mb-2 font-medium">Sleep Quality (1-10)</label>
        <select id="sleep" class="w-full bg-zinc-800 text-white rounded-xl p-4 text-2xl focus:outline-none focus:ring-2 focus:ring-sky-500">
          <option value="1">1 - 極差</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5 - 中等</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10 - 完美</option>
        </select>
      </div>
    </div>

    <div class="mt-8">
      <label class="block text-sm mb-2 font-medium">Notes / NoFap / Thoughts</label>
      <textarea id="notes" rows="3" class="w-full bg-zinc-800 rounded-xl p-4 text-white" placeholder="今日NoFap情況、身體感覺、overthinking..."></textarea>
    </div>

    <button onclick="saveEntry()" 
            class="mt-8 w-full bg-white text-black font-semibold py-4 rounded-2xl text-xl hover:bg-emerald-400 transition">
      ✅ Save Today's Entry
    </button>
  </div>

  <div class="mt-10">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">History</h2>
      <button onclick="exportCSV()" 
              class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-1">
        📤 Export CSV (Google Sheets / Notion)
      </button>
    </div>
    
    <table class="w-full text-sm">
      <thead class="bg-zinc-900">
        <tr>
          <th class="text-left p-3">Date</th>
          <th class="p-3">Energy</th>
          <th class="p-3">Stress</th>
          <th class="p-3">Sleep</th>
          <th class="text-left p-3">Notes</th>
        </tr>
      </thead>
      <tbody id="history" class="history"></tbody>
    </table>
  </div>

  <script>
    let entries = JSON.parse(localStorage.getItem('dailyTracker')) || [];

    function renderHistory() {
      const tbody = document.getElementById('history');
      tbody.innerHTML = '';
      entries.slice().reverse().forEach(entry => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-zinc-800 hover:bg-zinc-800';
        tr.innerHTML = `
          <td class="p-3">${entry.date}</td>
          <td class="p-3 text-center text-emerald-400 font-bold">${entry.energy}</td>
          <td class="p-3 text-center text-amber-400 font-bold">${entry.stress}</td>
          <td class="p-3 text-center text-sky-400 font-bold">${entry.sleep}</td>
          <td class="p-3 text-xs text-zinc-400">${entry.notes || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function saveEntry() {
      const entry = {
        date: new Date().toLocaleDateString('zh-HK'),
        energy: document.getElementById('energy').value,
        stress: document.getElementById('stress').value,
        sleep: document.getElementById('sleep').value,
        notes: document.getElementById('notes').value.trim()
      };
      entries.unshift(entry);
      localStorage.setItem('dailyTracker', JSON.stringify(entries));
      renderHistory();
      
      document.getElementById('notes').value = '';
      alert('✅ 已成功儲存！');
    }

    function exportCSV() {
      let csv = "Date,Energy,Stress,Sleep,Quality,Notes\n";
      entries.forEach(e => {
        csv += `${e.date},${e.energy},${e.stress},${e.sleep},"${(e.notes || '').replace(/"/g, '""')}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `daily-tracker-${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
    }

    // 載入歷史
    renderHistory();
  </script>
</body>
</html>
